<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四川水发勘测设计有限公司-XUZENGPEI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0a0e27 url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1h98v98H1V1zm1 1v96h96V2H2z' fill='%23162246' fill-opacity='0.4'/%3E%3C/svg%3E") repeat;
            color: #e0e6ff;
            overflow-x: hidden;
        }

        /* 顶部标题栏 - 科技流光 */
        .top-header {
            background: linear-gradient(90deg, #0f1a44, #162a5e, #0f1a44);
            padding: 20px 30px;
            border-bottom: 1px solid #254b8a;
            box-shadow: 0 0 20px rgba(0, 150, 255, 0.25);
            position: relative;
            overflow: hidden;
        }
        .top-header::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 200, 255, 0.15), transparent);
            animation: flowLight 6s linear infinite;
        }
        @keyframes flowLight {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        .header-wrap {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .site-title {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 180, 255, 0.5);
        }

        /* 时间状态栏 - 科技玻璃态 */
        .status-bar {
            max-width: 1200px;
            margin: 20px auto;
            padding: 18px 30px;
            background: rgba(15, 30, 70, 0.7);
            border: 1px solid #254b8a;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 100, 200, 0.2);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .time-date {
            color: #73d0ff;
            font-weight: 600;
        }
        #current-time {
            font-size: 38px;
            display: block;
            line-height: 1.2;
            text-shadow: 0 0 8px rgba(0, 200, 255, 0.6);
        }
        #current-date {
            font-size: 18px;
            margin-top: 5px;
            color: #a0c8ff;
        }
        .welcome-txt {
            font-size: 17px;
            color: #a0c8ff;
            text-shadow: 0 0 5px rgba(0, 150, 255, 0.4);
        }

        /* 全屏搜索框 - 科技发光 */
        .search-container {
            max-width: 1200px;
            margin: 0 auto 25px;
            padding: 0 20px;
        }
        .search-box {
            width: 100%;
            display: flex;
            gap: 10px;
            background: rgba(15, 30, 70, 0.7);
            border: 1px solid #254b8a;
            border-radius: 12px;
            padding: 15px 20px;
            box-shadow: 0 0 20px rgba(0, 100, 200, 0.2);
            backdrop-filter: blur(8px);
        }
        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            background: transparent;
            color: #e0e6ff;
        }
        .search-input::placeholder {
            color: #7088b8;
        }
        .search-btn {
            padding: 10px 28px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #0088dd, #00aaff);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            box-shadow: 0 0 10px rgba(0, 150, 255, 0.4);
        }
        .search-btn:hover {
            background: linear-gradient(135deg, #0077cc, #0099ee);
            box-shadow: 0 0 15px rgba(0, 180, 255, 0.6);
        }

        /* 主页备忘录 - 科技卡片 */
        .container-wrap {
            max-width: 1200px;
            margin: 0 auto 30px;
            padding: 0 20px;
        }
        .memo-home {
            background: rgba(15, 30, 70, 0.7);
            border: 1px solid #254b8a;
            border-radius: 12px;
            padding: 20px 25px;
            box-shadow: 0 0 20px rgba(0, 100, 200, 0.2);
            backdrop-filter: blur(8px);
        }
        .memo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .memo-title {
            font-size: 19px;
            color: #73d0ff;
            font-weight: 600;
            border-left: 4px solid #00aaff;
            padding-left: 12px;
            text-shadow: 0 0 6px rgba(0, 180, 255, 0.5);
        }
        .task-home-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .task-home-list::-webkit-scrollbar {
            width: 6px;
        }
        .task-home-list::-webkit-scrollbar-thumb {
            background: #254b8a;
            border-radius: 3px;
        }
        .task-home-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            background: rgba(25, 45, 90, 0.5);
            border: 1px solid #254b8a;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.2s ease;
        }
        .task-home-item:hover {
            background: rgba(35, 60, 120, 0.6);
        }
        .task-home-item.done .task-text {
            text-decoration: line-through;
            color: #7088b8;
        }
        .task-text {
            flex: 1;
            margin: 0 12px;
            font-size: 15px;
            color: #c0d8ff;
        }
        .task-check {
            width: 18px;
            height: 18px;
            accent-color: #00aaff;
        }
        .task-home-del {
            color: #ff6677;
            cursor: pointer;
            padding: 4px;
            transition: all 0.2s ease;
        }
        .task-home-del:hover {
            color: #ff8899;
        }

        /* 导航卡片区域 */
        .section-title {
            font-size: 19px;
            color: #73d0ff;
            font-weight: 600;
            margin: 10px 0 20px;
            padding-left: 12px;
            border-left: 4px solid #00aaff;
            text-shadow: 0 0 6px rgba(0, 180, 255, 0.5);
        }
        .nav-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        /* 科技风卡片 */
        .nav-card {
            background: rgba(15, 30, 70, 0.7);
            border: 1px solid #254b8a;
            border-radius: 12px;
            padding: 25px 15px;
            text-align: center;
            cursor: default;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 80, 160, 0.15);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(8px);
        }
        .nav-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 180, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }
        .nav-card:hover::before {
            left: 100%;
        }
        .edit-enabled .nav-card {
            cursor: move;
        }
        .edit-enabled .nav-card:active {
            cursor: grabbing;
        }
        .nav-card.sortable-ghost {
            background: rgba(20, 40, 80, 0.8);
            opacity: 0.7;
        }
        .nav-card.sortable-chosen {
            box-shadow: 0 0 25px rgba(0, 150, 255, 0.4);
            border-color: #00aaff;
        }
        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(0, 120, 220, 0.3);
            border-color: #0088dd;
        }

        .card-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
            background: linear-gradient(135deg, #0088dd, #00aaff);
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 10px rgba(0, 150, 255, 0.4);
        }

        .card-name {
            font-size: 15px;
            font-weight: 600;
            color: #c0d8ff;
            margin-bottom: 4px;
            text-shadow: 0 0 5px rgba(0, 100, 200, 0.3);
        }

        .card-url {
            font-size: 12px;
            color: #7088b8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 卡片编辑按钮（仅编辑模式显示） */
        .card-actions {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: all 0.3s ease;
        }
        .edit-enabled .card-actions {
            opacity: 1;
        }
        .action-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .edit-btn {
            background: linear-gradient(135deg, #0088dd, #00aaff);
        }
        .delete-btn {
            background: linear-gradient(135deg, #dd4455, #ff6677);
        }

        /* 卡片下方功能按钮（圆形图标） */
        .card-footer-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }
        .circle-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid #254b8a;
            background: rgba(15, 30, 70, 0.7);
            color: #73d0ff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 80, 160, 0.2);
            backdrop-filter: blur(8px);
        }
        .circle-btn:hover {
            background: rgba(25, 45, 90, 0.8);
            color: #00aaff;
            box-shadow: 0 0 15px rgba(0, 150, 255, 0.4);
            transform: translateY(-3px);
        }
        .circle-btn.active {
            background: linear-gradient(135deg, #dd4455, #ff6677);
            color: white;
            border-color: #ff6677;
            box-shadow: 0 0 15px rgba(220, 68, 85, 0.4);
        }

        /* 回到顶部 */
        .back-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #0088dd, #00aaff);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 150, 255, 0.4);
            opacity: 0;
            transition: all 0.3s;
            z-index: 99;
            border: 1px solid #00aaff;
        }
        .back-top.show {
            opacity: 1;
        }

        /* 弹窗 - 科技风 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 10, 30, 0.7);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }
        .modal.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal-content {
            background: rgba(15, 30, 70, 0.95);
            border: 1px solid #254b8a;
            border-radius: 12px;
            width: 90%;
            max-width: 520px;
            padding: 30px;
            transform: translateY(30px);
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(0, 100, 200, 0.3);
            backdrop-filter: blur(10px);
        }
        .modal.active .modal-content {
            transform: translateY(0);
        }
        .modal-title {
            font-size: 22px;
            font-weight: 700;
            color: #73d0ff;
            margin-bottom: 25px;
            text-align: center;
            text-shadow: 0 0 8px rgba(0, 180, 255, 0.5);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #a0c8ff;
            margin-bottom: 8px;
        }
        .form-input, .form-textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #254b8a;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            background: rgba(25, 45, 90, 0.5);
            color: #c0d8ff;
            transition: all 0.3s ease;
        }
        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }
        .form-input:focus, .form-textarea:focus {
            border-color: #00aaff;
            box-shadow: 0 0 0 3px rgba(0, 150, 255, 0.15);
        }
        .form-input::placeholder, .form-textarea::placeholder {
            color: #7088b8;
        }
        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        .modal-btn {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-cancel {
            background: rgba(35, 60, 120, 0.7);
            color: #c0d8ff;
            border: 1px solid #254b8a;
        }
        .btn-save {
            background: linear-gradient(135deg, #0088dd, #00aaff);
            color: white;
            box-shadow: 0 0 10px rgba(0, 150, 255, 0.4);
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .nav-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (max-width: 768px) {
            .nav-container {
                grid-template-columns: repeat(2, 1fr);
            }
            .status-bar {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            #current-time {
                font-size: 32px;
            }
        }
        @media (max-width: 480px) {
            .nav-container {
                grid-template-columns: 1fr;
            }
            .card-footer-actions {
                gap: 10px;
            }
            .circle-btn {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>
    <!-- 顶部标题 -->
    <div class="top-header">
        <div class="header-wrap">
            <div class="site-title">四川水发勘测设计有限公司-XUZENGPEI</div>
        </div>
    </div>

    <!-- 放大时间日期 -->
    <div class="status-bar">
        <div class="time-date">
            <span id="current-time">00:00:00</span>
            <span id="current-date">2025年01月01日 星期三</span>
        </div>
        <div class="welcome-txt">WELCOM TO SWHI</div>
    </div>

    <!-- 全屏搜索框 -->
    <div class="search-container">
        <div class="search-box">
            <input type="text" class="search-input" id="baidu-input" placeholder="请输入关键词搜索" onkeydown="if(event.key==='Enter')baiduSearch()">
            <button class="search-btn" onclick="baiduSearch()">百度搜索</button>
        </div>
    </div>

    <!-- 主页备忘录展示 -->
    <div class="container-wrap">
        <div class="memo-home">
            <div class="memo-header">
                <h3 class="memo-title">今日待办任务</h3>
                <button class="circle-btn" style="width:36px;height:36px;font-size:16px" onclick="openAddTaskModal()" title="添加任务">+</button>
            </div>
            <div class="task-home-list" id="taskHomeList"></div>
        </div>
    </div>

    <!-- 导航卡片 -->
    <div class="container-wrap">
        <h3 class="section-title">网站导航</h3>
        <div class="nav-container" id="nav-container"></div>
        <!-- 卡片下方功能按钮 -->
        <div class="card-footer-actions">
            <button class="circle-btn" onclick="addNewCard()" title="添加网站">+</button>
            <button class="circle-btn" id="editBtn" onclick="toggleEditMode()" title="编辑模式">⚙️</button>
        </div>
    </div>

    <!-- 回到顶部 -->
    <div class="back-top" id="backTop" onclick="scrollToTop()">
        <i class="fas fa-arrow-up"></i>
    </div>

    <!-- 编辑卡片弹窗 -->
    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <div class="modal-title" id="modal-title">管理</div>
            <div class="form-group">
                <label class="form-label">网站名称</label>
                <input type="text" class="form-input" id="card-name">
            </div>
            <div class="form-group">
                <label class="form-label">网站网址</label>
                <input type="text" class="form-input" id="card-url">
            </div>
            <div class="form-group">
                <label class="form-label">图标主题色(十六进制)</label>
                <input type="text" class="form-input" id="card-color" placeholder="#0088dd">
            </div>
            <div class="modal-buttons">
                <button class="modal-btn btn-cancel" onclick="closeModal()">取消</button>
                <button class="modal-btn btn-save" onclick="saveCard()">保存</button>
            </div>
        </div>
    </div>

    <!-- 添加任务弹窗 -->
    <div class="modal" id="task-modal">
        <div class="modal-content">
            <div class="modal-title">添加今日任务</div>
            <div class="form-group">
                <label class="form-label">任务内容</label>
                <textarea class="form-textarea" id="newTaskContent" placeholder="请输入今日待办任务..."></textarea>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn btn-cancel" onclick="closeTaskModal()">取消</button>
                <button class="modal-btn btn-save" onclick="saveNewTask()">保存任务</button>
            </div>
        </div>
    </div>

    <script>
        // 导航卡片数据
        let navData = [
            { name: "百度", url: "https://www.baidu.com", color: "#0088dd" },
            { name: "企业微信", url: "https://work.weixin.qq.com", color: "#00aa88" },
            { name: "GitHub", url: "https://github.com", color: "#7755dd" },
            { name: "哔哩哔哩", url: "https://www.bilibili.com", color: "#ff77bb" },
            { name: "网易云音乐", url: "https://music.163.com", color: "#dd4455" },
            { name: "知乎", url: "https://www.zhihu.com", color: "#00aabb" },
            { name: "CSDN", url: "https://www.csdn.net", color: "#ff8844" },
            { name: "掘金", url: "https://juejin.cn", color: "#22bb55" }
        ];

        // 备忘录任务数据
        let taskData = [];
        let editMode = false; // 编辑模式开关
        let currentEditIndex = null;
        let isAddMode = false;
        const modal = document.getElementById('edit-modal');
        const taskModal = document.getElementById('task-modal');
        const backTop = document.getElementById('backTop');
        const editBtn = document.getElementById('editBtn');
        const body = document.body;
        let sortableInstance = null;

        // 放大时间日期
        function updateTime() {
            const now = new Date();
            const h = now.getHours().toString().padStart(2,'0');
            const m = now.getMinutes().toString().padStart(2,'0');
            const s = now.getSeconds().toString().padStart(2,'0');
            document.getElementById('current-time').textContent = `${h}:${m}:${s}`;

            const weekArr = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
            const y = now.getFullYear();
            const mon = (now.getMonth()+1).toString().padStart(2,'0');
            const d = now.getDate().toString().padStart(2,'0');
            const w = weekArr[now.getDay()];
            document.getElementById('current-date').textContent = `${y}年${mon}月${d}日 ${w}`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 百度搜索
        function baiduSearch() {
            const keyword = document.getElementById('baidu-input').value.trim();
            if (keyword) window.open(`https://www.baidu.com/s?wd=${encodeURIComponent(keyword)}`);
        }

        // 回到顶部
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        window.addEventListener('scroll', () => {
            backTop.classList.toggle('show', window.scrollY > 300);
        });

        // ======================================
        // 编辑模式开关（核心功能）
        // ======================================
        function toggleEditMode() {
            editMode = !editMode;
            if (editMode) {
                body.classList.add('edit-enabled');
                editBtn.classList.add('active');
                editBtn.title = '退出编辑';
                renderCards(); // 重新渲染并初始化拖拽
            } else {
                body.classList.remove('edit-enabled');
                editBtn.classList.remove('active');
                editBtn.title = '编辑模式';
                if (sortableInstance) sortableInstance.destroy(); // 关闭拖拽
            }
        }

        // 本地存储加载
        function loadData() {
            const localNav = localStorage.getItem('navData');
            if (localNav) navData = JSON.parse(localNav);
            const localTask = localStorage.getItem('taskData');
            if (localTask) taskData = JSON.parse(localTask);

            renderCards();
            renderHomeTask();
        }

        // 初始化拖拽排序（修复：渲染后重新绑定）
        function initSortable() {
            const el = document.getElementById('nav-container');
            if (sortableInstance) sortableInstance.destroy();
            sortableInstance = new Sortable(el, {
                animation: 150,
                ghostClass: "sortable-ghost",
                chosenClass: "sortable-chosen",
                onEnd: function (evt) {
                    // 修复：正确更新数组顺序
                    const [removed] = navData.splice(evt.oldIndex, 1);
                    navData.splice(evt.newIndex, 0, removed);
                    localStorage.setItem('navData', JSON.stringify(navData));
                    renderCards(); // 重新渲染确保DOM和数据一致
                }
            });
        }

        // 渲染导航卡片
        function renderCards() {
            const container = document.getElementById('nav-container');
            container.innerHTML = '';
            navData.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'nav-card';
                card.dataset.index = index;
                card.innerHTML = `
                    <div class="card-actions">
                        <button class="action-btn edit-btn" onclick="openEditModal(${index})"><i class="fas fa-edit"></i></button>
                        <button class="action-btn delete-btn" onclick="deleteCard(${index})"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="card-icon" id="icon-${index}"></div>
                    <div class="card-name">${item.name}</div>
                    <div class="card-url">${item.url}</div>
                `;
                card.onclick = (e) => {
                    if (!e.target.closest('.card-actions')) window.open(item.url, '_blank');
                };
                container.appendChild(card);
                loadFavicon(item.url, index, item.color);
            });

            // 修复：编辑模式下渲染完再初始化拖拽
            if (editMode) {
                initSortable();
            }
        }

        // 网站图标
        function loadFavicon(url, index, color) {
            const iconDiv = document.getElementById(`icon-${index}`);
            const favicon = new Image();
            try {
                const domain = new URL(url).origin;
                favicon.onload = () => {
                    iconDiv.style.background = `url(${domain}/favicon.ico) center/cover`;
                    iconDiv.textContent = '';
                };
                favicon.onerror = () => {
                    iconDiv.style.background = color;
                    iconDiv.textContent = navData[index].name.charAt(0);
                };
                favicon.src = `${domain}/favicon.ico?timestamp=${new Date().getTime()}`;
            } catch (e) {
                iconDiv.style.background = color;
                iconDiv.textContent = navData[index]?.name?.charAt(0) || '★';
            }
        }

        // 卡片管理
        function addNewCard() {
            isAddMode = true;
            currentEditIndex = null;
            document.getElementById('modal-title').textContent = '添加常用网站';
            document.getElementById('card-name').value = '';
            document.getElementById('card-url').value = '';
            document.getElementById('card-color').value = '#0088dd';
            modal.classList.add('active');
        }
        function openEditModal(index) {
            isAddMode = false;
            currentEditIndex = index;
            const item = navData[index];
            document.getElementById('modal-title').textContent = '编辑网站信息';
            document.getElementById('card-name').value = item.name;
            document.getElementById('card-url').value = item.url;
            document.getElementById('card-color').value = item.color || '#0088dd';
            modal.classList.add('active');
        }
        function closeModal() { modal.classList.remove('active'); }
        function saveCard() {
            const name = document.getElementById('card-name').value.trim();
            const url = document.getElementById('card-url').value.trim();
            const color = document.getElementById('card-color').value.trim();
            if (!name) { alert('请输入网站名称！'); return; }
            if (!url) { alert('请输入网站网址！'); return; }

            const newCard = { name, url, color: color || '#0088dd' };
            if (isAddMode) navData.push(newCard);
            else navData[currentEditIndex] = newCard;

            localStorage.setItem('navData', JSON.stringify(navData));
            renderCards();
            closeModal();
        }
        function deleteCard(index) {
            if (!editMode) return;
            if (confirm('确定要删除该网站导航吗？')) {
                navData.splice(index, 1);
                localStorage.setItem('navData', JSON.stringify(navData));
                renderCards();
            }
        }

        // ======================================
        // 主页备忘录任务功能
        // ======================================
        function renderHomeTask() {
            const list = document.getElementById('taskHomeList');
            list.innerHTML = '';
            if (taskData.length === 0) {
                list.innerHTML = '<div style="text-align:center;color:#7088b8;padding:10px">暂无任务，点击右上角"+"添加</div>';
                return;
            }
            taskData.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = `task-home-item ${item.done ? 'done' : ''}`;
                div.innerHTML = `
                    <input type="checkbox" class="task-check" ${item.done ? 'checked' : ''} onchange="toggleHomeTask(${idx})">
                    <div class="task-text">${item.content}</div>
                    <i class="fas fa-trash task-home-del" onclick="delHomeTask(${idx})"></i>
                `;
                list.appendChild(div);
            });
        }
        function openAddTaskModal() {
            document.getElementById('newTaskContent').value = '';
            taskModal.classList.add('active');
        }
        function closeTaskModal() {
            taskModal.classList.remove('active');
        }
        function saveNewTask() {
            const val = document.getElementById('newTaskContent').value.trim();
            if (!val) { alert('请输入任务内容！'); return; }
            taskData.push({ content: val, done: false });
            localStorage.setItem('taskData', JSON.stringify(taskData));
            renderHomeTask();
            closeTaskModal();
        }
        function toggleHomeTask(idx) {
            taskData[idx].done = !taskData[idx].done;
            localStorage.setItem('taskData', JSON.stringify(taskData));
            renderHomeTask();
        }
        function delHomeTask(idx) {
            if (confirm('确定删除该任务？')) {
                taskData.splice(idx, 1);
                localStorage.setItem('taskData', JSON.stringify(taskData));
                renderHomeTask();
            }
        }

        // 初始化
        window.onload = loadData;
    </script>
</body>
</html>
