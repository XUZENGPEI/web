<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桌面导航系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298, #3a7bd5, #4a90e2);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 20px;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 18px;
            font-weight: 500;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .search-container {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 20px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .search-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            padding: 5px;
            background: transparent;
        }

        .search-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            background: #4a90e2;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-btn:hover {
            background: #3a7bd5;
            transform: scale(1.05);
        }

        /* 添加卡片按钮 */
        .add-card-btn {
            display: block;
            margin: 0 auto 30px;
            padding: 12px 30px;
            background: rgba(74, 144, 226, 0.9);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .add-card-btn:hover {
            background: #3a7bd5;
            transform: translateY(-3px);
        }

        /* 固定 4 列布局 */
        .nav-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }

        .nav-card {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 18px;
            padding: 25px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.35s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .nav-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(74, 144, 226, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .nav-card:hover::before {
            left: 100%;
        }

        .nav-card:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.15);
        }

        .card-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            background: linear-gradient(135deg, #4a90e2, #3a7bd5);
            background-size: cover;
            background-position: center;
        }

        .card-name {
            font-size: 16px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .card-url {
            font-size: 12px;
            color: #718096;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 编辑 + 删除按钮 */
        .card-actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .nav-card:hover .card-actions {
            opacity: 1;
        }

        .action-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .edit-btn {
            background: rgba(74, 144, 226, 0.9);
        }

        .delete-btn {
            background: rgba(220, 53, 69, 0.9);
        }

        .action-btn:hover {
            transform: scale(1.1);
        }

        /* 弹窗 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .modal.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 500px;
            border-radius: 20px;
            padding: 30px;
            transform: translateY(30px);
            transition: all 0.3s ease;
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 25px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2);
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-cancel {
            background: #f7fafc;
            color: #4a5568;
        }

        .btn-save {
            background: #4a90e2;
            color: white;
        }

        .btn-save:hover, .btn-cancel:hover {
            transform: translateY(-2px);
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .nav-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .nav-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .nav-container {
                grid-template-columns: 1fr;
            }
            .search-box {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- 状态栏 -->
    <div class="status-bar">
        <div id="current-time"></div>
        <div id="current-date"></div>
    </div>

    <!-- 搜索栏 -->
    <div class="search-container">
        <div class="search-box">
            <input type="text" class="search-input" id="baidu-input" placeholder="百度搜索">
            <button class="search-btn" onclick="baiduSearch()">搜索</button>
        </div>
        <div class="search-box">
            <input type="text" class="search-input" id="doubao-input" placeholder="豆包AI搜索">
            <button class="search-btn" onclick="doubaoSearch()">搜索</button>
        </div>
    </div>

    <!-- 添加卡片按钮 -->
    <button class="add-card-btn" onclick="addNewCard()">+ 添加新卡片</button>

    <!-- 导航卡片 -->
    <div class="nav-container" id="nav-container"></div>

    <!-- 编辑/新增弹窗 -->
    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <div class="modal-title" id="modal-title">编辑导航卡片</div>
            <div class="form-group">
                <label class="form-label">卡片名称</label>
                <input type="text" class="form-input" id="card-name">
            </div>
            <div class="form-group">
                <label class="form-label">网址/文件地址</label>
                <input type="text" class="form-input" id="card-url">
            </div>
            <div class="form-group">
                <label class="form-label">图标颜色(十六进制)</label>
                <input type="text" class="form-input" id="card-color" placeholder="#4a90e2">
            </div>
            <div class="modal-buttons">
                <button class="modal-btn btn-cancel" onclick="closeModal()">取消</button>
                <button class="modal-btn btn-save" onclick="saveCard()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // 默认导航数据
        let navData = [
            { name: "百度", url: "https://www.baidu.com", color: "#4a90e2" },
            { name: "豆包", url: "https://www.doubao.com", color: "#20c997" },
            { name: "GitHub", url: "https://github.com", color: "#6f42c1" },
            { name: "B站", url: "https://www.bilibili.com", color: "#ff69b4" },
            { name: "网易云", url: "https://music.163.com", color: "#dc3545" },
            { name: "知乎", url: "https://www.zhihu.com", color: "#17a2b8" },
            { name: "CSDN", url: "https://www.csdn.net", color: "#fd7e14" },
            { name: "掘金", url: "https://juejin.cn", color: "#28a745" }
        ];

        let currentEditIndex = null;
        let isAddMode = false;
        const modal = document.getElementById('edit-modal');

        // 实时时间
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleTimeString();
            document.getElementById('current-date').textContent = now.toLocaleDateString();
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 搜索
        function baiduSearch() {
            const keyword = document.getElementById('baidu-input').value.trim();
            if (keyword) window.open(`https://www.baidu.com/s?wd=${keyword}`);
        }

        function doubaoSearch() {
            const keyword = document.getElementById('doubao-input').value.trim();
            if (keyword) window.open(`https://www.doubao.com/search?q=${keyword}`);
        }

        // 加载本地存储
        function loadData() {
            const localData = localStorage.getItem('navData');
            if (localData) navData = JSON.parse(localData);
            renderCards();
        }

        // 渲染卡片
        function renderCards() {
            const container = document.getElementById('nav-container');
            container.innerHTML = '';
            navData.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'nav-card';
                card.innerHTML = `
                    <div class="card-actions">
                        <button class="action-btn edit-btn" onclick="openEditModal(${index})"><i class="fas fa-edit"></i></button>
                        <button class="action-btn delete-btn" onclick="deleteCard(${index})"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="card-icon" id="icon-${index}"></div>
                    <div class="card-name">${item.name}</div>
                    <div class="card-url">${item.url}</div>
                `;
                card.onclick = (e) => {
                    if (!e.target.closest('.card-actions')) window.open(item.url);
                };
                container.appendChild(card);
                loadFavicon(item.url, index, item.color);
            });
        }

        // 自动获取图标
        function loadFavicon(url, index, color) {
            const iconDiv = document.getElementById(`icon-${index}`);
            const favicon = new Image();
            try {
                const domain = new URL(url).origin;
                favicon.onload = () => {
                    iconDiv.style.background = `url(${domain}/favicon.ico) center/cover`;
                    iconDiv.innerHTML = '';
                };
                favicon.onerror = () => {
                    iconDiv.style.background = color;
                    iconDiv.innerHTML = navData[index].name.charAt(0);
                };
                favicon.src = `${domain}/favicon.ico`;
            } catch (e) {
                iconDiv.style.background = color;
                iconDiv.innerHTML = navData[index]?.name?.charAt(0) || '★';
            }
        }

        // 新增卡片
        function addNewCard() {
            isAddMode = true;
            currentEditIndex = null;
            document.getElementById('modal-title').textContent = '添加新卡片';
            document.getElementById('card-name').value = '';
            document.getElementById('card-url').value = '';
            document.getElementById('card-color').value = '#4a90e2';
            modal.classList.add('active');
        }

        // 编辑卡片
        function openEditModal(index) {
            isAddMode = false;
            currentEditIndex = index;
            const item = navData[index];
            document.getElementById('modal-title').textContent = '编辑导航卡片';
            document.getElementById('card-name').value = item.name;
            document.getElementById('card-url').value = item.url;
            document.getElementById('card-color').value = item.color || '#4a90e2';
            modal.classList.add('active');
        }

        // 关闭弹窗
        function closeModal() {
            modal.classList.remove('active');
        }

        // 保存（新增/编辑）
        function saveCard() {
            const newCard = {
                name: document.getElementById('card-name').value.trim() || '新卡片',
                url: document.getElementById('card-url').value.trim() || '#',
                color: document.getElementById('card-color').value.trim() || '#4a90e2'
            };

            if (isAddMode) {
                navData.push(newCard);
            } else {
                navData[currentEditIndex] = newCard;
            }

            localStorage.setItem('navData', JSON.stringify(navData));
            renderCards();
            closeModal();
        }

        // 删除卡片
        function deleteCard(index) {
            if (confirm('确定要删除这个卡片吗？')) {
                navData.splice(index, 1);
                localStorage.setItem('navData', JSON.stringify(navData));
                renderCards();
            }
        }

        // 初始化
        window.onload = loadData;
    </script>
</body>
</html>
